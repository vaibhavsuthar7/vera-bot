services:
  - type: web
    name: vera-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: TEAM_NAME
        value: "Vera-AI"
      - key: TEAM_MEMBERS
        value: "Your Name"
      - key: CONTACT_EMAIL
        value: "your@email.com"
